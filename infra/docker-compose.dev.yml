services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: larpchekr
      POSTGRES_PASSWORD: larpchekr
      POSTGRES_DB: larpchekr
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
